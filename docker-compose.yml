services:
  fintivi-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fintivi
      POSTGRES_PASSWORD: fintivi
      POSTGRES_DB: fintivi
    ports:
      - '5432:5432'
    volumes:
      - fintivi_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fintivi']
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  fintivi_pg:
